# Stores system paths (ONLY immutable structure)
# These define WHERE pipeline artifacts are stored — no tunable values here.

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
  local_data_file: artifacts/data_ingestion/WA_Fn-UseC_-Telco-Customer-Churn.csv
  unzip_dir: artifacts/data_ingestion

data_validation:
  root_dir: artifacts/data_validation
  STATUS_FILE: artifacts/data_validation/status.txt
  unzip_data_dir: artifacts/data_ingestion/WA_Fn-UseC_-Telco-Customer-Churn.csv

data_enrichment:
  root_dir: artifacts/data_enrichment
  raw_data_path: artifacts/data_ingestion/WA_Fn-UseC_-Telco-Customer-Churn.csv
  enriched_data_file: artifacts/data_enrichment/enriched_telco_churn.csv
  prompts_dir: src/enrichment

feature_engineering:
  root_dir: artifacts/feature_engineering
  input_data_path: artifacts/data_enrichment/enriched_telco_churn.csv
  train_data_path: artifacts/feature_engineering/train_features.csv
  test_data_path: artifacts/feature_engineering/test_features.csv
  val_data_path: artifacts/feature_engineering/val_features.csv
  structured_preprocessor_path: artifacts/feature_engineering/structured_preprocessor.pkl
  nlp_preprocessor_path: artifacts/feature_engineering/nlp_preprocessor.pkl

model_training:
  root_dir: artifacts/model_training
  structured_model_path: artifacts/model_training/structured_model.pkl
  nlp_model_path: artifacts/model_training/nlp_model.pkl
  meta_model_path: artifacts/model_training/meta_model.pkl
  evaluation_report_path: artifacts/model_training/evaluation_report.json

api:
  embedding_service:
    host: "127.0.0.1"
    port: 8001
    timeout_seconds: 5.0
    model_version: "all-MiniLM-L6-v2-pca20"
  prediction_api:
    host: "0.0.0.0"
    port: 8000
    model_version: "late-fusion-v2"