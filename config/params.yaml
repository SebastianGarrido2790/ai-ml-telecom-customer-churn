# Stores hyperparameters (ONLY tunable values)
# These control model behavior and experiment settings.

mlflow:
  uri: "file:./mlruns"
  experiment_name: "telco-churn-prediction"

training:
  test_size: 0.2
  random_state: 42
  target_column: "Churn"

enrichment:
  model_provider: "hybrid" # Options: google, openai, hybrid
  model_name: "gemini-2.0-flash" 
  base_url: null 
  secondary_model_name: "ollama:qwen2.5:7b"
  secondary_base_url: "http://localhost:11434/v1"
  batch_size: 2 # Reduced for Gemini Free Tier RPM limits (15 RPM)
  limit: 0  # Process the entire dataset

feature_engineering:
  embedding_model_name: "all-MiniLM-L6-v2"
  pca_components: 20
  test_size: 0.15
  val_size: 0.15
  random_state: 42



