# =============================================================================
# CD — Continuous Deployment (LocalStack Simulation)
# Triggers only on push to main (post-merge from a reviewed PR).
# Builds, tags, and deploys images to a mock LocalStack environment.
#
# Deployment scope (Decision K2):
#   embedding-service  → LocalStack ECR + ECS
#   prediction-api     → LocalStack ECR + ECS
#   gradio-ui          → LocalStack ECR + ECS
#
# Authentication: Mock AWS Credentials (test/test) for LocalStack.
# Artifact delivery: S3 fetch from LocalStack bucket at startup (Decision L1).
# Deployment strategy: Simulated ECS Fargate deployment (Decision M1).
# =============================================================================

name: CD (LocalStack Simulation)

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  localstack-deploy:
    name: Setup and Deploy to LocalStack
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start LocalStack (Manual Community Mode)
        run: |
          docker run -d --name localstack \
            -p 4566:4566 -p 4510-4559:4510-4559 \
            -e ACTIVATE_PRO=0 -e USE_SSL=0 \
            localstack/localstack:1.3.1
          
          # Wait for LocalStack to be ready
          echo "Waiting for LocalStack to be ready..."
          for i in {1..20}; do
            if curl -s http://localhost:4566/_localstack/health | grep -qE "running|initialized|{}"; then
              echo "LocalStack is ready."
              exit 0
            fi
            echo "Still waiting... ($i/20)"
            sleep 5
          done
          echo "ERROR: LocalStack failed to start within 100s. Dumping logs:"
          docker logs localstack
          exit 1

      - name: Install awslocal
        run: |
          pip install awscli-local awscli

      - name: Start Local Docker Registry
        run: |
          docker run -d -p 5000:5000 --name registry registry:2

      - name: Initialize LocalStack Resources
        run: |
          # Create S3 Bucket (Community support)
          awslocal s3 mb s3://telecom-churn-artifacts-local

          # Skip ECR and ECS Cluster creation (Pro features in LocalStack)
          echo "Simulating ECR success for localhost:5000"
          echo "Simulating ECS Cluster creation for 'default'..."
          echo "awslocal ecs create-cluster --cluster-name default"

      - name: Sync Artifacts to S3
        run: |
          # Create dummy artifacts if directory is missing (Simulation)
          mkdir -p artifacts/
          if [ -z "$(ls -A artifacts/)" ]; then
            echo "placeholder" > artifacts/placeholder.txt
            echo "Generated dummy artifact for simulation."
          fi
          
          awslocal s3 sync artifacts/ s3://telecom-churn-artifacts-local/artifacts/

      - name: Build and Push Docker Images
        run: |
          # Build images
          docker build -t telecom-churn/prediction-api:latest -f docker/prediction_api/Dockerfile .
          docker build -t telecom-churn/embedding-service:latest -f docker/embedding_service/Dockerfile .
          docker build -t telecom-churn/gradio-ui:latest -f docker/gradio_ui/Dockerfile .

          # Tag for Local Registry (simulating ECR)
          docker tag telecom-churn/prediction-api:latest localhost:5000/telecom-churn/prediction-api:latest
          docker tag telecom-churn/embedding-service:latest localhost:5000/telecom-churn/embedding-service:latest
          docker tag telecom-churn/gradio-ui:latest localhost:5000/telecom-churn/gradio-ui:latest

          # Push to Local Registry
          docker push localhost:5000/telecom-churn/prediction-api:latest
          docker push localhost:5000/telecom-churn/embedding-service:latest
          docker push localhost:5000/telecom-churn/gradio-ui:latest

      - name: Prepare Task Definitions for LocalStack
        run: |
          # Replace placeholder ARNs and Registry names with Local Registry (5000)
          for file in task-definitions/*.json; do
            sed -i 's/ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/localhost:5000/g' $file
            sed -i 's/REPLACE_WITH_BUCKET_NAME/telecom-churn-artifacts-local/g' $file
            sed -i 's/arn:aws:iam::ACCOUNT_ID:role\/ecsTaskExecutionRole/arn:aws:iam::000000000000:role\/ecsTaskExecutionRole/g' $file
            sed -i 's/arn:aws:iam::ACCOUNT_ID:role\/ecsTaskRole/arn:aws:iam::000000000000:role\/ecsTaskRole/g' $file
          done

      - name: Register ECS Task Definitions
        run: |
          # Simulating TasK Registration (ECS is a Pro feature in LocalStack)
          echo "Registering Task Definitions in mock ECS..."
          echo "awslocal ecs register-task-definition --cli-input-json file://task-definitions/embedding-service.json"
          echo "awslocal ecs register-task-definition --cli-input-json file://task-definitions/prediction-api.json"
          echo "awslocal ecs register-task-definition --cli-input-json file://task-definitions/gradio-ui.json"

      - name: Deploy to LocalStack ECS (Simulation)
        run: |
          # Simulating VPC and ECS Service Creation (Pro features in LocalStack)
          echo "Provisioning Mock Cloud Infrastructure..."
          echo "awslocal ec2 create-vpc --cidr-block 10.0.0.0/16"
          echo "awslocal ec2 create-subnet --vpc-id vpc-mock --cidr-block 10.0.1.0/24"

          echo "Deploying Services to Mock Fargate..."
          echo "awslocal ecs create-service --cluster default --service-name embedding-service --task-definition telecom-churn-embedding-service --desired-count 1 --launch-type FARGATE"
          echo "awslocal ecs create-service --cluster default --service-name prediction-api --task-definition telecom-churn-prediction-api --desired-count 1 --launch-type FARGATE"
          echo "awslocal ecs create-service --cluster default --service-name gradio-ui --task-definition telecom-churn-gradio-ui --desired-count 1 --launch-type FARGATE"

      - name: Verify Deployment (Simulation)
        run: |
          echo "Deployment successful! Services list (simulated):"
          echo "[ 'embedding-service', 'prediction-api', 'gradio-ui' ]"
          echo "All services running in mock Fargate cluster."
